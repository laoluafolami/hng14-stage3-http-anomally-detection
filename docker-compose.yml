version: "3.9"

services:

  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=HNG_Admin_2025!
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-net

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    networks:
      - hng-net

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: hng-detector
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
      - detector_audit:/var/log/detector
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:
  detector_audit:

networks:
  hng-net:
    driver: bridge
