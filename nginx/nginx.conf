user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
 
events { worker_connections 1024; }
 
http {
     include /etc/nginx/mime.types;
     default_type application/octet-stream;
 
    # JSON log format — every field the detector needs
     log_format hng_json escape=json
          '{' 
              '"source_ip":"$http_x_forwarded_for",' 
              '"remote_addr":"$remote_addr",' 
              '"timestamp":"$time_iso8601",' 
              '"method":"$request_method",' 
              '"path":"$request_uri",' 
              '"status":$status,' 
              '"response_size":$body_bytes_sent,' 
              '"user_agent":"$http_user_agent",' 
              '"request_time":$request_time' 
          '}';
 
    # Write JSON log to the shared volume
     access_log /var/log/nginx/hng-access.log hng_json;
     sendfile on;
     keepalive_timeout 65;
     client_max_body_size 512M;
 
     upstream nextcloud { server nextcloud:80; keepalive 32; }
 
    # Main server — Nextcloud on port 80
     server {
         listen 80;
         server_name _;
 
         location / {
             proxy_pass http://nextcloud;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header Host $host;
             proxy_read_timeout 300s;
             proxy_buffering off;
         }
 
         location /.well-known/carddav { return 301 $scheme://$host/remote.php/dav; }
         location /.well-known/caldav  { return 301 $scheme://$host/remote.php/dav; }
     }
    # Dashboard — served at your free Azure DNS hostname
     server {
         listen 80;
         server_name hng-stage3.centralus.cloudapp.azure.com;
 
         location / {
             proxy_pass http://172.17.0.1:8080;
             proxy_set_header Host $host;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_read_timeout 30s;
         }
     }


}
